url: https://pbenavidesh.github.io/psvr/

template:
  bootstrap: 5
  bootswatch: cosmo

home:
  title: "psvr — Percentage-Error SVR"
  description: >
    Four support vector regression models derived from a unified
    percentage-error loss framework (MAPE and RMSPE), with optional
    symmetric kernel extensions and tidymodels integration.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/pbenavidesh/psvr
      aria-label: GitHub

reference:
  - title: "Kernel factory"
    desc: "Shared kernel interface used by all four models."
    contents:
      - make_kernel

  - title: "Model 1 — ε-SVR with MAPE"
    desc: "Epsilon-insensitive SVR minimising the MAPE loss (Theorem 1)."
    contents:
      - mape_svr
      - predict.psvr_mape

  - title: "Model 2 — Symmetric ε-SVR with MAPE"
    desc: >
      Adds an even/odd symmetry constraint via the symmetric kernel
      `Ks(xi, xj) = K(xi, xj) + a·K(xi, -xj)` (Theorem 2).
    contents:
      - mape_sym_svr
      - predict.psvr_mape_sym

  - title: "Model 3 — LS-SVR with RMSPE"
    desc: "Least-squares SVR minimising the RMSPE loss (Theorem 3)."
    contents:
      - rmspe_lssvr
      - predict.psvr_rmspe

  - title: "Model 4 — Symmetric LS-SVR with RMSPE"
    desc: "Symmetric kernel extension of Model 3 (Theorem 4)."
    contents:
      - rmspe_sym_lssvr
      - predict.psvr_rmspe_sym

  - title: "tidymodels / parsnip interface"
    desc: "Parsnip model specifications for use in tidymodels workflows."
    contents:
      - psvr_mape
      - psvr_mape_sym
      - psvr_rmspe
      - psvr_rmspe_sym
      - psvr-fit-wrappers

news:
  releases:
  - text: "psvr 0.0.0.9000"
    href: news/index.html
