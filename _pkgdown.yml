url: https://pbenavidesh.github.io/psvr/

template:
  bootstrap: 5
  bootswatch: cosmo

home:
  title: "psvr — Percentage-Error SVR"
  description: >
    Four support vector regression models derived from a unified
    percentage-error loss framework (MAPE and RMSPE), with optional
    symmetric kernel extensions and tidymodels integration.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [github]
  components:
    intro:
      text: "Get Started"
      href: articles/getting-started.html
    github:
      icon: fab fa-github
      href: https://github.com/pbenavidesh/psvr
      aria-label: GitHub

reference:
  - title: "Kernel factory"
    desc: "Shared kernel interface used by all four models."
    contents:
      - make_kernel

  - title: "Model 1 — ε-SVR with MAPE"
    desc: "Epsilon-insensitive SVR minimising the MAPE loss (Theorem 1)."
    contents:
      - mape_svr
      - predict.psvr_mape

  - title: "Model 2 — Symmetric ε-SVR with MAPE"
    desc: >
      Adds an even/odd symmetry constraint via the symmetric kernel
      `Ks(xi, xj) = K(xi, xj) + a·K(xi, -xj)` (Theorem 2).
    contents:
      - mape_sym_svr
      - predict.psvr_mape_sym

  - title: "Model 3 — LS-SVR with RMSPE"
    desc: "Least-squares SVR minimising the RMSPE loss (Theorem 3)."
    contents:
      - rmspe_lssvr
      - predict.psvr_rmspe

  - title: "Model 4 — Symmetric LS-SVR with RMSPE"
    desc: "Symmetric kernel extension of Model 3 (Theorem 4)."
    contents:
      - rmspe_sym_lssvr
      - predict.psvr_rmspe_sym

  - title: "Model methods"
    desc: "S3 methods for inspecting and printing fitted psvr models."
    contents:
      - print.psvr_mape
      - print.psvr_mape_sym
      - print.psvr_rmspe
      - print.psvr_rmspe_sym
      - coef.psvr_mape
      - coef.psvr_mape_sym
      - coef.psvr_rmspe
      - coef.psvr_rmspe_sym

  - title: "tidymodels / parsnip interface — ε-SVR with MAPE (Model 1)"
    desc: "Parsnip model specifications for Model 1 (one per kernel type)."
    contents:
      - psvr_mape_specs

  - title: "tidymodels / parsnip interface — Symmetric ε-SVR with MAPE (Model 2)"
    desc: "Parsnip model specifications for Model 2 (one per kernel type)."
    contents:
      - psvr_mape_sym_specs

  - title: "tidymodels / parsnip interface — LS-SVR with RMSPE (Model 3)"
    desc: "Parsnip model specifications for Model 3 (one per kernel type)."
    contents:
      - psvr_rmspe_specs

  - title: "tidymodels / parsnip interface — Symmetric LS-SVR with RMSPE (Model 4)"
    desc: "Parsnip model specifications for Model 4 (one per kernel type)."
    contents:
      - psvr_rmspe_sym_specs

  - title: "Hyperparameter utilities"
    desc: "Custom dials parameters and tuning helpers for psvr models."
    contents:
      - margin_percentage
      - sigma_heuristic
      - rbf_sigma_psvr
      - rbf_sigma_psvr_data
      - psvr_option_add
      - psvr_option_add_cost_ls
      - cost_psvr
      - cost_psvr_ls_data
      - sym_type_param

  - title: "Internal fit wrappers"
    desc: "Low-level bridge functions called by parsnip; not for direct use."
    contents:
      - psvr-fit-wrappers

articles:
  - title: ~
    navbar: ~
    contents:
      - getting-started

  - title: "Workflows"
    navbar: "Workflows"
    contents:
      - tidymodels-workflow

  
  - title: "Case Studies"
    desc: >
      Reproducibility articles for the submitted manuscript.
      Results correspond to 30-seed benchmarks across three
      datasets.
    contents:
      - articles/boston-housing
      - articles/diabetes
      - articles/energy-efficiency
      - articles/electricity-forecasting
      - articles/boston-reflection-ablation

  - title: "Technical Notes"
    navbar: "Technical Notes"
    contents:
      - python-replication
      - articles/when-to-use-psvr

news:
  one_page_per_version: true
